<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Results - Miracle Home Makeover LLC</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

<style>
body {
margin: 0;
font-family: 'Poppins', sans-serif;
background: #f4f4f4;
padding-bottom: 120px;
}

/* NAV */
nav {
background: #e84d8a;
padding: 14px;
text-align: center;
position: sticky;
top: 0;
z-index: 1000;
}

nav a {
color: white;
padding: 12px 15px;
text-decoration: none;
font-weight: 600;
}

/* HEADER */
header {
text-align: center;
padding: 60px 20px;
background: linear-gradient(135deg, #1b9aaa, #157f86);
color: white;
}

/* BEFORE/AFTER */
.before-after-section {
max-width: 900px;
margin: 30px auto;
padding: 20px;
}

.before-after-section h2 {
text-align: center;
color: #e84d8a;
}

.ba-pair {
background: white;
padding: 16px;
border-radius: 18px;
margin-bottom: 25px;
box-shadow: 0 10px 25px rgba(0,0,0,0.08);
}

.ba-img {
position: relative;
margin-bottom: 10px;
}

.ba-img img {
width: 100%;
height: 260px;
object-fit: cover;
border-radius: 12px;
cursor: pointer;
}

.ba-label {
position: absolute;
top: 10px;
left: 10px;
padding: 6px 12px;
border-radius: 999px;
font-size: 12px;
color: white;
font-weight: 700;
}

.before { background: #333; }
.after { background: #e84d8a; }

/* BUTTON */
.view-more-wrap {
text-align: center;
margin-top: 20px;
}

.view-more-btn {
background: #e84d8a;
color: white;
border: none;
padding: 14px 24px;
border-radius: 999px;
font-weight: 700;
cursor: pointer;
}

/* GALLERY */
.gallery {
max-width: 1000px;
margin: 20px auto;
padding: 20px;
display: grid;
grid-template-columns: 1fr 1fr;
gap: 20px;
}

.gallery img {
width: 100%;
height: 260px;
object-fit: cover;
border-radius: 12px;
cursor: pointer;
}

/* HIDDEN */
.hidden {
display: none;
}

/* LIGHTBOX */
.lightbox {
display: none;
position: fixed;
z-index: 2000;
left: 0;
top: 0;
width: 100%;
height: 100%;
background: rgba(0,0,0,0.9);
justify-content: center;
align-items: center;
}

.lightbox img {
max-width: 90%;
max-height: 90%;
}

.lightbox.active {
display: flex;
}

.arrow {
position: absolute;
top: 50%;
font-size: 40px;
color: white;
cursor: pointer;
}

.left { left: 20px; }
.right { right: 20px; }

/* MOBILE */
@media (max-width:700px){
.gallery { grid-template-columns:1fr; }
}
</style>
</head>

<body>

<header>
<h1>Results</h1>
<p>Your Home, But Elevated.</p>
</header>

<section class="before-after-section">
<h2>Transformations</h2>

<!-- PAIR 1 -->
<div class="ba-pair">
<div class="ba-img">
<span class="ba-label before">Before</span>
<img src="IMG_5530.jpeg">
</div>
<div class="ba-img">
<span class="ba-label after">After</span>
<img src="IMG_5648.jpeg">
</div>
</div>

<!-- PAIR 2 -->
<div class="ba-pair">
<div class="ba-img">
<span class="ba-label before">Before</span>
<img src="IMG_5531.jpeg">
</div>
<div class="ba-img">
<span class="ba-label after">After</span>
<img src="IMG_5650.jpeg">
</div>
</div>

<div class="view-more-wrap">
<button class="view-more-btn" id="viewBtn">View More Results</button>
</div>

</section>

<!-- FULL GALLERY -->
<section class="gallery hidden" id="gallery">

<img src="IMG_6342.jpeg">
<img src="IMG_5382.jpeg">
<img src="IMG_5381.jpeg">
<img src="IMG_5380.jpeg">
<img src="IMG_5374.jpeg">
<img src="IMG_5371.jpeg">
<img src="IMG_5378.jpeg">
<img src="IMG_5205.jpeg">
<img src="IMG_6336.png">
<img src="IMG_5200.jpeg">
<img src="IMG_6340.jpeg">
<img src="IMG_5579.jpeg">
<img src="IMG_5581.jpeg">
<img src="IMG_5583.jpeg">
<img src="IMG_5585.jpeg">
<img src="IMG_5602.jpeg">
<img src="IMG_5604.jpeg">
<img src="IMG_5610.jpeg">
<img src="IMG_5611.jpeg">
<img src="IMG_5634.jpeg">
<img src="IMG_5635.jpeg">
<img src="IMG_5640.jpeg">
<img src="IMG_5642.jpeg">
<img src="IMG_5643.jpeg">
<img src="IMG_5645.jpeg">

</section>

<!-- LIGHTBOX -->
<div class="lightbox" id="lightbox">
<div class="arrow left" id="prev">&#10094;</div>
<img id="lightImg">
<div class="arrow right" id="next">&#10095;</div>
</div>

<script>
const viewBtn = document.getElementById('viewBtn');
const gallery = document.getElementById('gallery');

viewBtn.onclick = () => {
gallery.classList.toggle('hidden');
viewBtn.textContent = gallery.classList.contains('hidden')
? "View More Results"
: "Show Less";
};

const images = document.querySelectorAll("img");
const lightbox = document.getElementById("lightbox");
const lightImg = document.getElementById("lightImg");

let index = 0;

images.forEach((img,i)=>{
img.onclick = ()=>{
lightbox.classList.add("active");
lightImg.src = img.src;
index = i;
};
});

document.getElementById("next").onclick = ()=>{
index = (index+1)%images.length;
lightImg.src = images[index].src;
};

document.getElementById("prev").onclick = ()=>{
index = (index-1+images.length)%images.length;
lightImg.src = images[index].src;
};

lightbox.onclick = (e)=>{
if(e.target === lightbox){
lightbox.classList.remove("active");
}
};
</script>

</body>
</html>
