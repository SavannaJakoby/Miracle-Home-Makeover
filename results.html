<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Results - Miracle Home Makeover LLC</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

<style>
body {
margin: 0;
font-family: 'Poppins', sans-serif;
background: #f4f4f4;
padding-bottom: 120px;
}

/* NAV */
nav {
background: #e84d8a;
padding: 14px;
text-align: center;
position: sticky;
top: 0;
z-index: 1000;
}

nav a {
color: white;
padding: 12px 15px;
text-decoration: none;
font-weight: 600;
}

/* DROPDOWN */
.dropdown {
display: inline-block;
position: relative;
}

.dropdown-content {
position: absolute;
top: 120%;
left: 50%;
transform: translateX(-50%) translateY(10px);
background: #e84d8a;
min-width: 240px;
border-radius: 12px;
box-shadow: 0 10px 30px rgba(0,0,0,0.2);
opacity: 0;
visibility: hidden;
transition: all 0.25s ease;
overflow: hidden;
z-index: 999;
border: 1px solid rgba(255,255,255,0.2);
}

.dropdown-content a {
display: block;
padding: 14px 18px;
color: white;
text-decoration: none;
font-weight: 500;
border-bottom: 1px solid rgba(255,255,255,0.2);
}

.dropdown-content a:last-child {
border-bottom: none;
}

.dropdown-content a:hover {
background: rgba(255,255,255,0.15);
padding-left: 22px;
}

.dropdown:hover .dropdown-content {
opacity: 1;
visibility: visible;
transform: translateX(-50%) translateY(0);
}

/* HEADER */
header {
text-align: center;
padding: 60px 20px;
background: linear-gradient(135deg, #1b9aaa, #157f86);
color: white;
}

header h1 {
margin: 0 0 10px;
font-size: 32px;
}

header p {
margin: 0;
font-size: 18px;
font-weight: 600;
}

/* GALLERY */
.gallery {
max-width: 1000px;
margin: 30px auto;
padding: 20px;
display: grid;
grid-template-columns: 1fr 1fr;
gap: 20px;
}

.gallery img {
width: 100%;
height: 280px;
object-fit: cover;
border-radius: 12px;
box-shadow: 0 8px 20px rgba(0,0,0,0.15);
transition: 0.3s;
background: white;
cursor: pointer;
}

.gallery img:hover {
transform: scale(1.03);
}

/* LIGHTBOX */
.lightbox {
display: none;
position: fixed;
z-index: 2000;
left: 0;
top: 0;
width: 100%;
height: 100%;
background: rgba(0,0,0,0.9);
justify-content: center;
align-items: center;
padding: 20px;
box-sizing: border-box;
}

.lightbox img {
max-width: 95%;
max-height: 90%;
border-radius: 12px;
box-shadow: 0 10px 30px rgba(0,0,0,0.5);
}

.lightbox.active {
display: flex;
}

.close-lightbox {
position: absolute;
top: 20px;
right: 25px;
font-size: 36px;
font-weight: bold;
color: white;
cursor: pointer;
line-height: 1;
}

/* ARROWS */
.arrow {
position: absolute;
top: 50%;
transform: translateY(-50%);
font-size: 40px;
color: white;
cursor: pointer;
padding: 10px;
user-select: none;
}

.arrow.left {
left: 20px;
}

.arrow.right {
right: 20px;
}

/* FLOAT BUTTON */
.float-btn {
position: fixed;
right: 14px;
bottom: 14px;
background: linear-gradient(135deg, #e84d8a, #d63d78);
color: white;
padding: 12px 18px;
border-radius: 999px;
text-decoration: none;
font-weight: 700;
font-size: 16px;
box-shadow: 0 8px 20px rgba(0,0,0,0.22);
z-index: 1001;
}

/* MOBILE */
@media (max-width: 700px) {
.gallery {
grid-template-columns: 1fr;
}

.gallery img {
height: 220px;
}

body {
padding-bottom: 110px;
}
}
</style>
</head>

<body>

<nav>

<div class="dropdown">

<header>
<h1>Results</h1>
<p>Your Home, But Elevated.</p>
<p>Every Home Deserves a Miracle!</p>
</header>

<section class="gallery">
<img src="E5FA79F1-9DAB-4D20-AC94-664BAA2A257B.png">
<img src="IMG_5382.jpeg">
<img src="IMG_5381.jpeg">
<img src="IMG_5380.jpeg">

<img src="IMG_6336.png">
<img src="IMG_5200.jpeg">
<img src="IMG_6340.jpeg">
<img src="IMG_6339.jpeg">
</section>

<div class="lightbox" id="lightbox">
<span class="close-lightbox" id="closeLightbox">&times;</span>

<div class="arrow left" id="prev">&#10094;</div>
<img id="lightbox-img">
<div class="arrow right" id="next">&#10095;</div>

</div>

<a href="quote.html" class="float-btn">Request Quote</a>

<script>
const galleryImages = document.querySelectorAll('.gallery img');
const lightbox = document.getElementById('lightbox');
const lightboxImg = document.getElementById('lightbox-img');
const closeLightbox = document.getElementById('closeLightbox');
const nextBtn = document.getElementById('next');
const prevBtn = document.getElementById('prev');

let currentIndex = 0;

function showImage(index) {
lightboxImg.src = galleryImages[index].src;
currentIndex = index;
}

galleryImages.forEach((img, index) => {
img.addEventListener('click', () => {
lightbox.classList.add('active');
showImage(index);
});
});

nextBtn.onclick = () => {
currentIndex = (currentIndex + 1) % galleryImages.length;
showImage(currentIndex);
};

prevBtn.onclick = () => {
currentIndex = (currentIndex - 1 + galleryImages.length) % galleryImages.length;
showImage(currentIndex);
};

closeLightbox.onclick = () => {
lightbox.classList.remove('active');
};

lightbox.onclick = (e) => {
if (e.target === lightbox) {
lightbox.classList.remove('active');
}
};

/* KEYBOARD SUPPORT */
document.addEventListener('keydown', (e) => {
if (!lightbox.classList.contains('active')) return;

if (e.key === 'ArrowRight') nextBtn.click();
if (e.key === 'ArrowLeft') prevBtn.click();
if (e.key === 'Escape') lightbox.classList.remove('active');
});

/* SWIPE SUPPORT */
let startX = 0;

lightbox.addEventListener('touchstart', e => {
startX = e.touches[0].clientX;
});

lightbox.addEventListener('touchend', e => {
let endX = e.changedTouches[0].clientX;

if (startX - endX > 50) nextBtn.click();
if (endX - startX > 50) prevBtn.click();
});
</script>

</body>
</html>
