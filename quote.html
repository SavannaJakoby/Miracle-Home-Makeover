<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Request a Quote</title>

<style>
body {
font-family: Arial;
text-align: center;
padding: 20px;
}

/* INPUTS */
input, textarea {
padding: 10px;
width: 85%;
margin: 10px 0;
}

/* BUTTON */
button {
padding: 12px 20px;
background: #1b9aaa;
color: white;
border: none;
cursor: pointer;
border-radius: 5px;
}

/* BACK BUTTON */
.back-btn {
display: inline-block;
margin-top: 20px;
text-decoration: none;
color: white;
background: #0d1b2a;
padding: 10px 20px;
border-radius: 5px;
}
</style>
</head>

<body>

<h1>Request a Quote</h1>

<!-- FORM -->
<div id="form">

<h3>Your Name</h3>
<input type="text" id="name" placeholder="Full Name">

<h3>Full Address</h3>
<input type="text" id="address" placeholder="Full Address">

<h3>What do you need done?</h3>
<textarea id="details" placeholder="Describe services needed"></textarea>

<br><br>

<button onclick="sendQuote()">Submit Request</button>

</div>

<!-- THANK YOU -->
<div id="thankyou" style="display:none;">
<h2>Thank you!</h2>
<p>Your request is ready to send.</p>

<a id="textLink" target="_blank">
<button>Send Text Now</button>
</a>

<br>

<a href="index.html" class="back-btn">Back to Website</a>
</div>

<script>
function sendQuote() {

var name = document.getElementById("name").value;
var address = document.getElementById("address").value;
var details = document.getElementById("details").value;

/* FORMAT MESSAGE */
var message =
"Quote Request:%0A%0A" +
"Name: " + name + "%0A" +
"Address: " + address + "%0A" +
"Details: " + details;

/* YOUR PHONE NUMBER */
var phone = "13043502545";

/* CREATE SMS LINK */
var link = "sms:" + phone + "?body=" + message;

document.getElementById("textLink").href = link;

/* SHOW THANK YOU */
document.getElementById("form").style.display = "none";
document.getElementById("thankyou").style.display = "block";
}
</script>

</body>
</html>
