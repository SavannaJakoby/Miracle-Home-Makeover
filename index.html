<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Miracle Home Makeover LLC</title>

  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" />

  <style>
    body {
      margin: 0;
      font-family: 'Poppins', sans-serif;
      background: #f4f4f4;
      padding-bottom: 120px; /* keeps content from being covered by button */
    }

    nav {
      background: #e84d8a;
      padding: 14px;
      text-align: center;
      position: sticky;
      top: 0;
      z-index: 1000;
    }

    nav a {
      color: white;
      padding: 12px 15px;
      text-decoration: none;
      font-weight: 600;
    }

    .dropdown {
      display: inline-block;
      position: relative;
    }

    .dropdown-content {
      position: absolute;
      top: 120%;
      left: 50%;
      transform: translateX(-50%) translateY(10px);
      background: #e84d8a;
      min-width: 240px;
      border-radius: 12px;
      box-shadow: 0 10px 30px rgba(0,0,0,0.2);
      opacity: 0;
      visibility: hidden;
      transition: all 0.25s ease;
      overflow: hidden;
      z-index: 999;
      border: 1px solid rgba(255,255,255,0.2);
    }

    .dropdown-content a {
      display: block;
      padding: 14px 18px;
      color: white;
      text-decoration: none;
      font-weight: 500;
      border-bottom: 1px solid rgba(255,255,255,0.2);
    }

    .dropdown-content a:last-child {
      border-bottom: none;
    }

    .dropdown-content a:hover {
      background: rgba(255,255,255,0.15);
      padding-left: 22px;
    }

    .dropdown:hover .dropdown-content {
      opacity: 1;
      visibility: visible;
      transform: translateX(-50%) translateY(0);
    }

    header {
      text-align: center;
      padding: 10px 10px 5px;
      background: linear-gradient(135deg, #1b9aaa, #157f86);
      color: white;
    }

    .logo {
      width: 100%;
      max-width: 580px;
      display: block;
      margin: 0 auto 0;
      filter: drop-shadow(0 15px 30px rgba(0,0,0,0.3));
    }

    header p {
      margin: 5px 0 2px;
      font-size: 22px;
      font-weight: 700;
      letter-spacing: 0.3px;
      text-shadow: 0 2px 8px rgba(0,0,0,0.25);
    }

    .subtext {
      font-size: 18px;
      font-weight: 600;
      opacity: 0.95;
      margin-top: 2px;
      margin-bottom: 0;
      text-shadow: 0 2px 8px rgba(0,0,0,0.25);
    }

    .bio {
      max-width: 900px;
      margin: 40px auto;
      padding: 35px 25px;
      background: white;
      border-radius: 15px;
      box-shadow: 0 10px 25px rgba(0,0,0,0.08);
    }

    .bio h2 {
      text-align: center;
      color: #e84d8a;
      font-weight: 700;
    }

    .trust {
      max-width: 900px;
      margin: 20px auto;
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 15px;
      padding: 0 20px;
    }

    .badge {
      background: linear-gradient(135deg, #e84d8a, #d63d78);
      color: white;
      padding: 18px;
      border-radius: 12px;
      text-align: center;
      font-weight: 600;
      box-shadow: 0 5px 15px rgba(0,0,0,0.1);
    }

    .services {
      max-width: 900px;
      margin: auto;
      padding: 20px;
    }

    .tile {
      background: white;
      color: #333;
      padding: 20px;
      margin-bottom: 15px;
      border-radius: 12px;
      text-decoration: none;
      display: block;
      font-weight: 600;
      box-shadow: 0 5px 15px rgba(0,0,0,0.08);
      transition: 0.2s;
    }

    .tile:hover {
      transform: translateY(-6px);
      box-shadow: 0 15px 25px rgba(0,0,0,0.15);
    }

    .icon {
      color: #e84d8a;
      margin-right: 10px;
    }

    .contact {
      text-align: center;
      padding: 50px 20px;
      background: white;
      margin-top: 40px;
    }

    .contact h2 {
      color: #e84d8a;
      font-weight: 700;
    }

    .contact a {
      display: block;
      margin: 12px;
      color: #e84d8a;
      font-weight: 600;
      text-decoration: none;
    }

    .float-btn {
      position: fixed;
      right: 20px;
      bottom: 20px;
      background: linear-gradient(135deg, #e84d8a, #d63d78);
      color: white;
      padding: 14px 20px;
      border-radius: 999px;
      text-decoration: none;
      font-weight: 700;
      box-shadow: 0 8px 20px rgba(0,0,0,0.25);
      z-index: 1001;
      font-size: 18px;
      line-height: 1;
    }

    .float-btn:hover {
      transform: translateY(-2px);
    }

    @media (max-width: 700px) {
      .trust {
        grid-template-columns: 1fr;
      }

      .logo {
        max-width: 500px;
      }

      header p {
        font-size: 20px;
      }

      .subtext {
        font-size: 16px;
      }

      .float-btn {
        right: 14px;
        bottom: 14px;
        padding: 12px 18px;
        font-size: 16px;
      }

      body {
        padding-bottom: 110px;
      }
    }
  </style>
</head>
